volumes:
  hume_controller_data:
  hume_operator_data:
  kafka_data:
services:
  postgres-controller:
    image: docker.graphaware.com/mirror/postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_USER: alert-controller
      POSTGRES_PASSWORD: alert
    command: -p 5436
    ports:
      - 5436:5436
    volumes:
      - "hume_controller_data:/var/lib/postgresql/data"
  postgres-operator:
    image: docker.graphaware.com/mirror/postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_USER: operator
      POSTGRES_PASSWORD: operator
    command: -p 5434
    ports:
      - 5434:5434
    volumes:
      - "hume_operator_data:/var/lib/postgresql/data"
  # Overrides
  api:
    environment:
      - HUME_FEATURE_ALERTS_ENABLED=true
      - HUME_FEATURE_COLLECTIONS_ENABLED=true
      - HUME_ALERTING_URI=http://alerting-controller:8200
      - alerting.client.enabled=true
  hume-config-cli:
    environment:
      - hume.config.profiles.alerting=true
  alerting-controller:
    image: docker.graphaware.com/hume-alerting/hume-alerting-controller:${HUME_VERSION}
    environment:
      - logging.format=text
      - BROKERS=kafka:9092
      - spring.mail.host=mail
      - spring.mail.port=1025
      - spring.mail.username=
      - spring.mail.password=
      - spring.mail.properties.mail.smtp.auth=false
      - notifier.mail.from=no-reply@graphaware.com
      - notifier.mail.to=alerting@graphaware.com
      - spring.kafka.consumer.bootstrap-servers=kafka:9092
      - spring.datasource.url=jdbc:postgresql://postgres-controller:5436/alert-controller
      - spring.datasource.username=alert-controller
      - spring.datasource.password=alert
      - controller.remoteEventsEnabled=true
      - kafka.topics.prefix=${KAFKA_TOPICS_PREFIX}
      - kafka.topics.names.feedback=feedback
      - kafka.topics.names.scheduler=scheduler
      - kafka.topics.names.action=actions
      - kafka.topics.names.notification=notification
      - kafka.topics.names.dryRunRequest=dryrun-request
      - kafka.topics.names.dryRunResult=dryrun-result
      - kafka.topics.names.remoteEvents=events
      - controller.execution.ttl.active=true
      - controller.execution.ttl.ms=60000
      - management.endpoints.web.exposure.include=health,prometheus
    depends_on:
      postgres-controller:
        condition: service_started
      kafka:
        condition: service_healthy
    restart: on-failure
  alerting-operator:
    image: docker.graphaware.com/hume-alerting/hume-alerting-operator:${HUME_VERSION}
    environment:
      - logging.format=text
      - BROKERS=kafka:9092
      - ZKNODES=zookeeper:2181
      - spring.datasource.url=jdbc:postgresql://postgres-operator:5434/operator?rewriteBatchedStatements=true
      - spring.datasource.username=operator
      - spring.datasource.password=operator
      - hume.security.encryption.engine=keystore
      - hume.security.encryption.keystore.file=/opt/hume-keystore
      - hume.security.encryption.keystore.password=changeit
      - hume.security.encryption.keystore.secret.alias=secret
      - kafka.topics.prefix=${KAFKA_TOPICS_PREFIX}
      - kafka.topics.names.feedback=feedback
      - kafka.topics.names.scheduler=scheduler
      - kafka.topics.names.action=actions
      - kafka.topics.names.notification=notification
      - kafka.topics.names.dryRunRequest=dryrun-request
      - kafka.topics.names.dryRunResult=dryrun-result
      - management.endpoints.web.exposure.include=bindings,health,prometheus
    depends_on:
      postgres-operator:
        condition: service_started
      kafka:
        condition: service_healthy
    volumes:
      - "./config/keystore/hume-keystore:/opt/hume-keystore"
    restart: on-failure
  kafka:
    image: apache/kafka-native:3.9.0
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--list", "--bootstrap-server", "localhost:9092"]
      interval: 2s
      retries: 30
      start_period: 5s
      timeout: 5s
    volumes:
      - "kafka_data:/var/lib/kafka/data"
    restart: on-failure
  kafka-console:
    image: docker.redpanda.com/redpandadata/console:latest
    environment:
      - KAFKA_BROKERS=kafka:9092
    ports:
      - 8085:8080
    depends_on:
      - kafka
    restart: on-failure
  mail:
    image: docker.graphaware.com/mirror/mailhog/mailhog:v1.0.1
    ports:
      - 1025:1025
      - 8025:8025