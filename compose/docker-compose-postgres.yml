volumes:
  hume_postgres_data:
  hume_orchestra_postgres:
  hume_media_postgres_data:
  hume_eventstore_data:
services:
  postgres:
    image: docker.graphaware.com/mirror/postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_PASSWORD: ${HUME_DB_PASSWORD:-pgsqls3cr3t}
      POSTGRES_USER: ${HUME_DB_USER:-hume}
    ports:
      - 5432:5432
    volumes:
      - "hume_postgres_data:/var/lib/postgresql/data"
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HUME_DB_USER:-hume}"]
      interval: 5s
      retries: 10
      start_period: 10s
      timeout: 5s
  postgres-orchestra:
    image: docker.graphaware.com/mirror/postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_PASSWORD: pgsqls3cr3t
      POSTGRES_USER: orchestra
    ports:
      - 5435:5435
    command: -p 5435
    volumes:
      - "hume_orchestra_postgres:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestra -p 5435"]
      interval: 5s
      retries: 10
      start_period: 10s
      timeout: 5s
  postgres-media:
    image: docker.graphaware.com/mirror/postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_PASSWORD: media
      POSTGRES_USER: media
    ports:
      - 5442:5432
    volumes:
      - "hume_media_postgres_data:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U media"]
      interval: 5s
      retries: 10
      start_period: 10s
      timeout: 5s
  postgres-eventstore:
    image: docker.graphaware.com/mirror/postgres:${POSTGRES_VERSION}
    environment:
      POSTGRES_PASSWORD: password123
      POSTGRES_USER: eventstore
    ports:
      - 5440:5440
    volumes:
      - "hume_eventstore_data:/var/lib/postgresql/data"
    command: -p 5440
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventstore -p 5440"]
      interval: 5s
      retries: 10
      start_period: 10s
      timeout: 5s
