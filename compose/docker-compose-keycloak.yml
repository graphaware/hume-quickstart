volumes:
  hume_keycloak_data:
services:
  postgres-keycloak:
    image: docker.graphaware.com/mirror/postgres:${POSTGRES_VERSION}
    volumes:
      - "hume_keycloak_data:/var/lib/postgresql/data"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
    command: -p 5433
    expose:
      - "5433"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p 5433 -U keycloak"]
      interval: 2s
      retries: 30
      start_period: 10s
      timeout: 3s
  keycloak:
    image: keycloak/keycloak:${KEYCLOAK_VERSION}
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-keycloak:5433/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=password
      - KC_BOOTSTRAP_ADMIN_USERNAME=admin
      - KC_BOOTSTRAP_ADMIN_PASSWORD=hellopassword
      - KC_HTTP_ENABLED=true
      - KC_HTTP_PORT=8080
      - KC_HTTPS_PORT=8443
      - KC_HOSTNAME=http://localhost:8180
      - KC_HOSTNAME_PORT=8180
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_DEBUG=true
      - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=true
      - KC_LOG_LEVEL=info
    command: start --https-certificate-file=/certs/keycloak.pem --https-certificate-key-file=/certs/keycloak-key.pem
    volumes:
      - ./certs:/certs:ro
    ports:
      - "8180:8080"
      - "8443:8443"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
  keycloak-config:
    image: adorsys/keycloak-config-cli:${KEYCLOAK_CLI_VERSION}
    environment:
      - logging.level.root=DEBUG
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_USER=admin
      - KEYCLOAK_PASSWORD=hellopassword
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=hellopassword
      - KEYCLOAK_AVAILABILITYCHECK_ENABLED=true
      # The first time keycloak can take some time to be ready, use a sensible timeout
      - KEYCLOAK_AVAILABILITYCHECK_TIMEOUT=120s
      - IMPORT_VARSUBSTITUTION=true
      - TESTUSER_PASSWORD=${TESTUSER_PASSWORD:-default}
      - IMPORT_PATH=/config
    volumes:
      - ./../config/keycloak:/config
  media:
    environment:
      - hume.security.provider=keycloak
      - keycloak.enabled=true
      - keycloak.auth-server-url=http://keycloak:8080
      - keycloak.realm=hume
      - keycloak.resource=hume-web
