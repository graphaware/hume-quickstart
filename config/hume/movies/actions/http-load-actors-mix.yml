apiVersion: v1
kind: Action
metadata:
  name: load-actors-http-mix
  knowledge-graph: movies-kg
  tags:
    - all
spec:
  label: 'Load Actors with Http action - Mix'
  scope: GLOBAL
  returnType: GRAPH
  httpApiResource: movies-http-api
  query: |-
    MATCH path=(n:Person)-[:ACTED_IN]->(movie)
    WHERE elementId(n) = $name
    RETURN path
  defaultValuesResolver:
    type: API
    params:
      endpoint: search-actor-default-resolver
  inputParameters:
    - name: name
      label: Name
      type: SELECT_ASYNC
      multiselect: false
      required: true
      resolver:
        type: API
        params:
          endpoint: name-async-select-resolver