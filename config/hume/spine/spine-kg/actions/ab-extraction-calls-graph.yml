kind: Action
metadata:
  name: ab-extraction-calls-graph
  knowledge-graph: SPINE
spec:
  label: ab-extraction-calls-graph
  query: |-
    WITH
      CASE WHEN $dateFrom IS null THEN null ELSE date($dateFrom) END AS dateFrom,
      CASE WHEN $dateTo IS NULL THEN null ELSE date($dateTo) END AS dateTo

    MATCH callPath = (n:DeviceExtraction)-[:HAS_CALL]->(c:Call)
      WHERE n.id = $device
      AND c.id IN $callIds
      AND (
          (CASE WHEN $dateFrom IS NULL
                THEN true
                ELSE c.timestamp >= datetime({year: dateFrom.year, month: dateFrom.month, day: dateFrom.day, hour: 0, minute: 0})
          END)
          AND
          (CASE WHEN $dateTo IS NULL
                THEN true
                ELSE c.timestamp <= datetime({year: dateTo.year, month: dateTo.month, day: dateTo.day, hour: 23, minute: 59})
          END)
      )

    OPTIONAL MATCH contactIdentPath = (c)<-[r:PARTY_IN_CALL]-(ci:ContactIdentifier)
    OPTIONAL MATCH phoneNumPath = (ci)-[:IS_PHONE_NUMBER]->(phoneNum)
    OPTIONAL MATCH contactPath = (ci)<-[:WITH_CONTACT_IDENTIFIER]-(contact)
    OPTIONAL MATCH userPath = (ci)<-[:HAS_USER_IDENTIFIER]-(n)

    RETURN callPath, contactIdentPath, phoneNumPath, contactPath, userPath
  returnType: GRAPH
  scope: UTILITY
  inclusions: {}
  inputParameters:
  - name: device
    label: Extraction Id
    type: STRING
    multiselect: false
    list: false
    required: true
    forgetValue: true
  - name: dateFrom
    label: Date From
    type: DATE
    multiselect: false
    list: false
    required: false
    forgetValue: true
  - name: dateTo
    label: Date To
    type: DATE
    multiselect: false
    list: false
    required: false
    selectOptions:
    - {}
    forgetValue: true
  - name: callIds
    label: Call Ids
    type: STRING
    multiselect: false
    list: true
    required: false
    forgetValue: true
  actionType: CYPHER
  canvasOptions:
    clearCanvas: false
    fitCanvas: false
  httpActionIncludeCanvasInPayload: false
