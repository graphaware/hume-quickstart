        type: DATE
        unique: false
        position: 2
        dataSources:
        - HMPS
        list: false
      - label: offenderStatus
        type: STRING
        unique: false
        description: |-
          *   **PAROLE** – The person has been released to community supervision (parole/Mandatory Supervised Release) and remains in HMPS’s legal custody until final discharge.
          *   **IN CUSTODY** – The person is currently confined under HMPS control (e.g., in a state prison/center) rather than in the community.
          *   **RECEPTION** – Newly admitted (or returned) and in the Reception & Classification process before permanent placement.
          *   **WORK RELEASE CUSTODY** – The person is housed at an Adult Transition Center (ATC) and allowed to work in the community under strict supervision; they are still in HMPS custody.
          *   **ABSCONDER** – Typically a parolee who has willfully evaded supervision/whereabouts unknown; a warrant may be issued and HMPS can seek extradition.
          *   **NON-HMPS CUSTODY** – The person is not physically in an HMPS facility but is held by another authority (e.g., county jail, another state, or federal) while HMPS still lists them.
          *   **BOND** – Indicates the person is/was held on court-ordered bond (usually in county custody pretrial).
          *   **WRIT** – Temporarily “out to court” under a writ of habeas corpus (e.g., _ad prosequendum_ or _ad testificandum_) to appear or testify, then returned to the holding authority.
          *   **TEMP RESIDENT** – Used for short-term/temporary placement at a facility (e.g., pending transfer, classification, or court movement). HMPS doesn’t publish a formal public definition; this is the common operational meaning. (Inferred from HMPS usage patterns and movement statuses.)
          *   **MEDICAL FURLOUGH** – A temporary leave from secure custody for limited medical purposes, authorized under HMPS rules.
          *   **ESCAPE** – The person has unlawfully left custody/supervision; they are considered a fugitive until apprehended.
          *   **DETAINER** – Another jurisdiction has lodged a legal “hold” for pending charges or proceedings; it can prevent release until that matter is resolved (governed by the Agreement on Detainers).
          *   **DISCHARGED** – The person has completed their custodial sentence (including any applicable parole period) and is no longer subject to prison or probation supervision; they are fully released and free from sentence obligations.
        position: 3
        dataSources:
        - HMPS
        list: false
      - label: id
        type: STRING
        unique: true
        position: 4
        dataSources:
        - HMPS
        list: false
      dataSources:
      - HMPS
